<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Website</title>
    <style>
        /* This is the 'Design' part */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; color: #333; background-color: #f4f4f9; }
        header { background: #2c3e50; color: white; padding: 2rem text-align: center; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        h1 { margin: 0; font-size: 2.5rem; }
        .btn { background: #3498db; color: white; padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 5px; display: inline-block; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
        footer { text-align: center; padding: 2rem; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Site</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>About This Project</h2>
            <p>This is my very first website. I'm learning how to code and host things for free!</p>
            <a href="#" class="btn">Click Me</a>
        </div>

        <div class="card">
            <h2>My Skills</h2>
            <ul>
                <li>Learning HTML & CSS</li>
                <li>Designing Layouts</li>
                <li>Being Awesome</li>
            </ul>
        </div>
    </div>

    <footer>
        &copy; 2024 My Name. Hosted for free on GitHub.
    </footer>

</body>
</html>
